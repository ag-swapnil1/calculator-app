<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

                <div class="field" id="8">8</div>

                <div class="field" id="1">1</div>
                <div class="field" id="2">2</div>
                <div class="field" id="3">3</div>
                <div class="field" id="0">0</div>
                <div class="field" id="RESET">RESET</div>
                <div class="field" id="=">=</div>
            </div>
        </div>
    </div>
    <footer>
        <p>© 2026 CalcuLite. All rights reserved.<br>Build with 🖤 by <a href="">Swapnil Agrahari</a></p>
